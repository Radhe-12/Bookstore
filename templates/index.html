<!DOCTYPE html>
<html>
<head>
    <title>Book Store</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .book {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        .form-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📚 Book Store</h1>
</div>

<div class="container">

    <!-- Search -->
    <form method="GET">
        <input type="text" name="q" placeholder="Search book">
        <button type="submit">Search</button>
    </form>

    <!-- Filter -->
    <form method="GET">
        <select name="category">
            <option value="">All</option>
            <option>Fiction</option>
            <option>Tech</option>
            <option>Self-help</option>
            <option>Finance</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <hr>

    {% for book in books %}
    <div class="book">
        <h3>{{ book.name }}</h3>
        <p>{{ book.category }}</p>
        <p class="price">₹ {{ book.price }}</p>

        <a href="/buy/{{ book.name }}">
            <button>Buy</button>
        </a>
    </div>
    {% endfor %}

    <div class="form-section">
        <h2>Add New Book</h2>
        <form method="POST" action="/add">
            <input type="text" name="name" placeholder="Book Name" required>
            <input type="text" name="category" placeholder="Category" required>
            <input type="number" name="price" placeholder="Price" required>
            <button type="submit">Add Book</button>
        </form>
    </div>

</div>

</body>
</html>
