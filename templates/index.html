<!DOCTYPE html>
<html>
<head>
    <title>📚 Book Store</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .book {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .book:hover {
            transform: scale(1.02);
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        form {
            margin: 10px 0;
        }

        input, select {
            padding: 6px;
            margin-right: 10px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📚 Book Store</h1>

        <!-- Search -->
        <form method="GET">
            <input type="text" name="q" placeholder="Search book">
            <button type="submit">Search</button>
        </form>

        <!-- Filter -->
        <form method="GET">
            <select name="category">
                <option value="">All</option>
                <option>Fiction</option>
                <option>Tech</option>
                <option>Self-help</option>
                <option>Finance</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        {% for book in books %}
        <div class="book">
            <h2>{{ book.name }}</h2>
            <p>Category: {{ book.category }}</p>
            <p class="price">₹ {{ book.price }}</p>

            <a href="/buy/{{ book.name }}">
                <button>Buy</button>
            </a>
        </div>
        {% endfor %}

        <h2 style="color:white;">Add New Book</h2>
        <form method="POST" action="/add">
            <input type="text" name="name" placeholder="Book Name" required>
            <input type="text" name="category" placeholder="Category" required>
            <input type="number" name="price" placeholder="Price" required>
            <button type="submit">Add Book</button>
        </form>

    </div>
</body>
</html>
